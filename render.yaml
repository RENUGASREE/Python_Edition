# Render Blueprint — Python Edition (free tier compatible)
# No shell required: curriculum auto-seeds on first API startup.

services:
  - type: web
    name: python-edition-api
    runtime: node
    rootDir: server
    buildCommand: npm install
    startCommand: node src/index.js
    healthCheckPath: /api/health
    plan: free
    envVars:
      - key: NODE_ENV
        value: production
      - key: AUTO_SEED_ON_STARTUP
        value: "true"
      - key: JWT_ACCESS_EXPIRES_IN
        value: 15m
      - key: PYTHON_BIN
        value: python3
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: CLIENT_ORIGINS
        sync: false
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: SEED_SECRET
        generateValue: true

  - type: web
    name: python-edition-web
    runtime: static
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    plan: free
    envVars:
      - key: VITE_API_BASE_URL
        sync: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
